<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <form>
            <tr>
                <td><label>Name *</label></td>
            </tr>
            <tr>
                <td><input type="text" placeholder="First Name"></td>
                <td><input type="text" placeholder="Middle Name"></td>
                <td><input type="text" placeholder="Last Name"></td>
            </tr>
            <tr>
                <td><label>Birth Date *</label></td>
            </tr>
            <tr>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td><label>Gender *</label></td>
            </tr>
            <tr>
                <td><input type="radio" name="gender">Male</td>
            </tr>
            <tr>
                <td><input type="radio" name="gender">Female</td>
            </tr>
            <tr>
                <td><input type="radio" name="gender">Decline to Answer</td>
            </tr>
            <tr>
                <td><label>Are you Hispanic or Latino? *</label></td>
            </tr>
            <tr>
                <td><input type="radio" name="y/s/d">No</td>
            </tr>
            <tr>
                <td><input type="radio" name="y/s/d">Yes</td>
            </tr>
            <tr>
                <td><input type="radio" name="y/s/d">Decline to Answer</td>
            </tr>
        </form>
    </table>
</body>
</html>
