    <title>Document</title>
    <style>
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }

        .grid {
            border: 2px solid;
            height: 180px;
            margin: 4px;
            text-align: center;
            align-content: center;
            font-size: xx-large;
            background-color: lightgray;
        }

        #grid4{
            grid-column: 3/3;
            grid-row: 2/3;
        }
        #grid5{
            grid-column: 3/3;
            grid-row: 3/3;
        }
        #grid6{
            grid-column: 2/3;
            grid-row: 3/3;
        }
        #grid7{
            grid-row: 3/3;
        }
        #grid8{
            grid-row: 2/3;
        }

</head>

<body>

        <div class="grid" id="grid3">3</div>
        <div class="grid" id="grid4">4</div>
