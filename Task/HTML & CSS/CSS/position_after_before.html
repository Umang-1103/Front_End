
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            position: relative;
            width: 300px;
            height: 200px;
            margin: 200px auto;
            overflow: hidden;        
        }
        img{
            width: 300px;
            height: 200px;
        }
        .main::before{
            content: "";
            width: 300px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.1);
            position: absolute;
            transform: translate(-100%, 100%);
            transition: .5s;
        }
        .main:hover::before{
            transform: translate(0%, 0%);
        } 

        .main::after{
            content: "";
            width: 300px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.1);
            position: absolute;
            transform: translate(0%, -100%);
            transition: .5s;
        }
        .main:hover::after{
            transform: translate(-100%, 0%);
        }
    </style>
</head>
<body>
    <div class="main">
        <img src="./bot1.jpg">
    </div>
</body>
</html>
