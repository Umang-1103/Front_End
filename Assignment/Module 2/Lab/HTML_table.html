<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <h2>Products</h2>
    <table border="1" cellspacing="0" cellpadding="4">
        <tr>
            <th>Product Name</th>
            <th>Product Image</th>
            <th>Price</th>
            <th>Description</th>
            <th>Availability</th>
        </tr>
        <tr>
            <td>Smartphone</td>
            <td><img src="./phone.jpeg" alt="Smartphone"></td>
            <td>$299</td>
            <td>High-quality smartphone with advanced features.</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Laptop</td>
            <td><img src="./laptop.webp" alt="Laptop"></td>
            <td>$799</td>
            <td>Powerful laptop suitable for work and gaming.</td>
            <td>Out of Stock</td>
        </tr>
        <tr>
            <td>Headphones</td>
            <td><img src="./headphones.webp" alt="Headphones"></td>
            <td>$99</td>
            <td>Noise-cancelling over-ear headphones.</td>
            <td>In Stock</td>
        </tr>
    </table>

</body>
</html>
