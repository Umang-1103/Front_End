<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        body{
            padding: 20px 0;
        }
        .grid{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-auto-rows: 410px;
            gap: 20px;
        }
        .card{
            width: 100%;
            border: 2px solid black;
            border-radius: 8px;
            text-align: center;
        }
        .card:hover{
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card">
            <img src="./Images/C1.jpg" alt="">
            <h1>Plain Blue Shirt</h1>
            <h3>$45.55</h3>
        </div>
        <div class="card">
            <img src="./Images/C2.jpg" alt="">
            <h1>Full Sleeve Sweatshirt</h1>
            <h3>$45.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C3.jpg" alt="">
            <h1>Dark Blue Track Pants</h1>
            <h3>$80.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C4.jpg" alt="">
            <h1>Black T-Shirt</h1>
            <h3>$190.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C5.jpg" alt="">
            <h1>Black Jeans</h1>
            <h3>$60.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C6.jpg" alt="">
            <h1>Watch</h1>
            <h3>$16.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C7.jpg" alt="">
            <h1>Belt</h1>
            <h3>$130.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C8.jpg" alt="">
            <h1>Men's Blazer</h1>
            <h3>$270.99</h3>
        </div>
        <div class="card">
            <img src="./Images/C9.jpg" alt="">
            <h1>Running Shoes</h1>
            <h3>$80.99</h3>
        </div>
    </div>
</body>
</html>
